<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lawn Program Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --grass: #3d6b35;
  --grass-light: #5a9448;
  --grass-pale: #e8f0e4;
  --soil: #6b4c2a;
  --soil-light: #c49a6c;
  --cream: #f5f0e8;
  --paper: #faf8f3;
  --ink: #1a1a18;
  --ink-mid: #4a4a42;
  --ink-light: #8a8a7a;
  --border: #d8d0c0;
  --tag-fertilise: #4a7c3f;
  --tag-biostimulant: #7b5ea7;
  --tag-herbicide: #c0692a;
  --tag-fungicide: #c0882a;
  --tag-insecticide: #2a7aa0;
  --tag-soilwetter: #3a7a8a;
  --tag-renovation: #6b4c2a;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Mono', monospace; background: var(--paper); color: var(--ink); min-height: 100vh; font-size: 15px; line-height: 1.6; }

header {
  background: var(--grass); color: var(--cream); padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 58px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}
.header-title { font-family: 'Fraunces', serif; font-size: 21px; font-weight: 600; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
.header-right { display: flex; align-items: center; gap: 16px; }
#auth-status { font-size: 12px; opacity: 0.8; display: flex; align-items: center; gap: 6px; }
.auth-dot { width: 7px; height: 7px; border-radius: 50%; background: #ff6b6b; flex-shrink: 0; }
.auth-dot.connected { background: #6bff8a; }
#login-btn {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  color: var(--cream); padding: 5px 14px; border-radius: 4px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.5px; transition: background 0.15s;
}
#login-btn:hover { background: rgba(255,255,255,0.25); }
#login-btn.hidden { display: none; }

.month-nav {
  background: var(--cream); border-bottom: 1px solid var(--border);
  padding: 0 24px; display: flex; align-items: center; overflow-x: auto; scrollbar-width: none;
}
.month-nav::-webkit-scrollbar { display: none; }
.month-btn {
  padding: 13px 17px; border: none; background: none; font-family: 'DM Mono', monospace;
  font-size: 12px; color: var(--ink-light); cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent; transition: all 0.15s; text-transform: uppercase;
  letter-spacing: 0.8px; position: relative;
}
.month-btn:hover { color: var(--grass); }
.month-btn.active { color: var(--grass); border-bottom-color: var(--grass); font-weight: 500; }
.month-btn.current-month::after {
  content: ''; width: 4px; height: 4px; background: var(--grass-light);
  border-radius: 50%; position: absolute; top: 8px; right: 6px;
}

.month-progress {
  background: var(--cream); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; gap: 16px;
}
.progress-label { font-size: 12px; color: var(--ink-light); text-transform: uppercase; letter-spacing: 0.8px; white-space: nowrap; }
.progress-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--grass); border-radius: 3px; transition: width 0.4s ease; }
.progress-count { font-size: 12px; color: var(--ink-mid); white-space: nowrap; min-width: 65px; text-align: right; }

main { max-width: 920px; margin: 0 auto; padding: 28px 24px; }

.week-block { margin-bottom: 32px; }
.week-heading { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.week-num { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 300; font-style: italic; color: var(--grass); line-height: 1; }
.week-label-text { font-size: 13px; color: var(--ink-light); text-transform: uppercase; letter-spacing: 0.8px; }

.task-card { background: white; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; overflow: hidden; transition: box-shadow 0.15s; }
.task-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.task-card.completed { opacity: 0.6; }
.task-card.completed .task-label { text-decoration: line-through; color: var(--ink-light); }
.task-card.conditional { border-left: 3px solid var(--soil-light); }

.task-header { display: flex; align-items: flex-start; gap: 12px; padding: 15px 17px; }
.task-check {
  width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 3px;
  flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; cursor: pointer;
}
.task-check.checked { background: var(--grass); border-color: var(--grass); }
.task-check.checked::after { content: '\2713'; color: white; font-size: 12px; font-weight: bold; }
.task-check.saving { border-color: var(--soil-light); animation: pulse 0.8s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.task-body { flex: 1; min-width: 0; }
.task-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.task-label { font-size: 15px; font-weight: 500; color: var(--ink); }
.type-tag { font-size: 11px; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; color: white; flex-shrink: 0; }
.type-tag.fertilise    { background: var(--tag-fertilise); }
.type-tag.biostimulant { background: var(--tag-biostimulant); }
.type-tag.herbicide    { background: var(--tag-herbicide); }
.type-tag.fungicide    { background: var(--tag-fungicide); }
.type-tag.insecticide  { background: var(--tag-insecticide); }
.type-tag.soilwetter   { background: var(--tag-soilwetter); }
.type-tag.renovation   { background: var(--tag-renovation); }
.conditional-flag { font-size: 11px; padding: 2px 8px; border-radius: 3px; background: var(--cream); border: 1px solid var(--soil-light); color: var(--soil); }
.task-method { font-size: 13px; color: var(--ink-light); margin-top: 2px; }
.expand-btn { font-size: 13px; color: var(--grass); background: none; border: none; cursor: pointer; padding: 2px 0; margin-top: 5px; font-family: 'DM Mono', monospace; display: flex; align-items: center; gap: 4px; }
.expand-btn:hover { text-decoration: underline; }

.task-detail { display: none; padding: 0 17px 16px 49px; border-top: 1px solid var(--grass-pale); background: var(--grass-pale); }
.task-detail.open { display: block; }

.products-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink-light); margin-bottom: 8px; margin-top: 14px; }
.product-name { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 4px; }
.product-note { font-size: 13px; color: var(--soil); font-style: italic; margin-top: 4px; }
.product-zones { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 7px; align-items: flex-start; }
.zone-qty { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 5px 10px; font-size: 11px; display: flex; flex-direction: column; align-items: center; min-width: 88px; }
.zone-qty-label { font-size: 11px; color: var(--ink-light); text-transform: uppercase; letter-spacing: 0.5px; }
.zone-qty-grass { font-size: 11px; color: var(--grass); margin-bottom: 2px; }
.zone-qty-amount { font-weight: 500; color: var(--ink); font-size: 15px; }
.zone-qty-divider { width: 1px; background: var(--border); align-self: stretch; margin: 0 2px; }
.zone-qty.combined { background: var(--grass); border-color: var(--grass); }
.zone-qty.combined .zone-qty-label { color: rgba(255,255,255,0.75); }
.zone-qty.combined .zone-qty-grass { color: rgba(255,255,255,0.65); }
.zone-qty.combined .zone-qty-amount { color: white; }

.notes-section { margin-top: 12px; }
.task-notes-text { font-size: 13px; color: var(--ink-mid); line-height: 1.6; padding: 9px 12px; background: white; border-radius: 4px; border: 1px solid var(--border); }
.cautions-wrap { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 6px; }
.caution-chip { font-size: 12px; padding: 4px 10px; border-radius: 12px; border: 1px solid; display: flex; align-items: center; gap: 4px; cursor: help; position: relative; }
.caution-chip[data-caution="iron-overload"]       { color: #8a5a00; border-color: #d4a017; background: #fff9e8; }
.caution-chip[data-caution="kelpxtra-solo"]       { color: #8a1a00; border-color: #c0401a; background: #fff5f2; }
.caution-chip[data-caution="fungicide-rotation"]  { color: #4a1a6a; border-color: #8a4a9a; background: #faf0ff; }
.caution-chip[data-caution="staining"]            { color: #8a3a00; border-color: #c07030; background: #fff3ee; }
.caution-chip[data-caution="water-in"]            { color: #0a3a6a; border-color: #2a6a9a; background: #eef5ff; }
.caution-chip[data-caution="no-backpack-sprayer"] { color: #8a0000; border-color: #c04040; background: #fff0f0; }
.caution-chip[data-caution="low-stock"]           { color: #8a0000; border-color: #c04040; background: #fff0f0; }
.caution-chip[data-caution="pre-emergent-weed-free-first"] { color: #1a5a0a; border-color: #3a8a3a; background: #f0fff0; }
.caution-chip[data-caution="tank-mix-dilute-first"] { color: #5a4a00; border-color: #8a7a2a; background: #fffaee; }
.caution-tooltip { display: none; position: absolute; bottom: calc(100% + 6px); left: 0; background: var(--ink); color: var(--cream); padding: 7px 11px; border-radius: 4px; font-size: 12px; white-space: normal; max-width: 280px; z-index: 200; line-height: 1.5; pointer-events: none; }
.caution-chip:hover .caution-tooltip { display: block; }
.completion-info { margin-top: 9px; font-size: 12px; color: var(--ink-light); font-style: italic; }

.condition-banner { margin: 0 17px 10px 49px; padding: 7px 11px; background: #fff8f0; border: 1px solid var(--soil-light); border-radius: 4px; font-size: 13px; color: var(--soil); }

#loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 58px); gap: 16px; color: var(--ink-light); }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--grass); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; letter-spacing: 0.5px; }

#error-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 58px); gap: 12px; color: var(--ink-mid); text-align: center; padding: 24px; }
.error-icon { font-size: 36px; }
.error-title { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink); }
.error-msg { font-size: 14px; color: var(--ink-light); max-width: 400px; line-height: 1.6; }

#auth-gate { display: none; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 58px); gap: 16px; text-align: center; padding: 24px; }
.auth-gate-icon { font-size: 40px; }
.auth-gate-title { font-family: 'Fraunces', serif; font-size: 24px; color: var(--ink); }
.auth-gate-msg { font-size: 14px; color: var(--ink-light); max-width: 360px; line-height: 1.6; }
#github-login-btn { background: var(--grass); color: white; border: none; padding: 12px 28px; border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 14px; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 8px; }
#github-login-btn:hover { background: var(--grass-light); }

#app { display: none; }

#toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: var(--cream); padding: 10px 18px; border-radius: 5px; font-size: 13px; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 500; max-width: 320px; }
#toast.show { opacity: 1; transform: translateY(0); }
#toast.error { background: #8a2020; }
#toast.success { background: var(--grass); }

.season-badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.6px; margin-left: 8px; vertical-align: middle; }
.season-badge.summer { background: #fff0cc; color: #8a5a00; border: 1px solid #d4a017; }
.season-badge.autumn { background: #ffe8d0; color: #8a3a00; border: 1px solid #d47030; }
.season-badge.winter { background: #d8eeff; color: #0a3a6a; border: 1px solid #4a80b0; }
.season-badge.spring { background: #e0f5d0; color: #1a5a0a; border: 1px solid #5a9448; }

.month-header-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 22px; }
.month-title { font-family: 'Fraunces', serif; font-weight: 300; font-size: 30px; color: var(--ink); letter-spacing: -0.5px; }

@media (max-width: 600px) {
  main { padding: 16px; }
  header { padding: 0 16px; }
  .month-nav { padding: 0 12px; }
  .month-progress { padding: 10px 16px; }
  .month-btn { padding: 10px 10px; font-size: 11px; }
  .task-detail { padding-left: 16px; }
  .zone-qty { min-width: 76px; }
}
</style>
</head>
<body>

<header>
  <div class="header-title">🌿 Lawn Program Tracker</div>
  <div class="header-right">
    <div id="auth-status">
      <div class="auth-dot" id="auth-dot"></div>
      <span id="auth-status-text">Not connected</span>
    </div>
    <button id="login-btn" onclick="startLogin()">Connect GitHub</button>
  </div>
</header>

<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text">Loading program data...</div>
</div>

<div id="error-screen">
  <div class="error-icon">&#x26A0;</div>
  <div class="error-title">Could not load program</div>
  <div class="error-msg" id="error-msg-text">Unable to fetch program data from GitHub.</div>
  <button onclick="init()" style="margin-top:12px;background:var(--grass);color:white;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace;font-size:13px;">Retry</button>
</div>

<div id="auth-gate">
  <div class="auth-gate-icon">&#x1F510;</div>
  <div class="auth-gate-title">Connect to save completions</div>
  <div class="auth-gate-msg">Connect your GitHub account to save task completions. You can also browse the program without logging in.</div>
  <button id="github-login-btn" onclick="startLogin()">Connect GitHub</button>
  <button onclick="loadWithoutAuth()" style="background:none;border:none;color:var(--ink-light);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;text-decoration:underline;margin-top:4px;">Browse without saving</button>
</div>

<div id="app">
  <nav class="month-nav" id="month-nav"></nav>
  <div class="month-progress">
    <div class="progress-label">Month progress</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-count" id="progress-count">0 / 0</div>
  </div>
  <main id="main-content"></main>
</div>

<div id="toast"></div>

<script>
var CONFIG = {
  owner: 'cjj-gmail',
  repo: 'lawn-care-tools',
  branch: 'main',
  programUrl: 'https://raw.githubusercontent.com/cjj-gmail/lawn-care-tools/main/data/program.json',
  completionsPath: 'data/completions.json',
  workerUrl: 'https://lawn-care-tools.cameronjude1.workers.dev'
};

var state = {
  program: null,
  completions: {},
  completionsSha: null,
  token: null,
  currentMonth: null,
  readOnly: false
};

var ZONE_LABELS = {
  back:   { name: 'Back Lawn',    grass: 'Kikuyu', area: 68.2 },
  front:  { name: 'Front Lawn',   grass: 'Zoysia', area: 35.0 },
  strip1: { name: 'Nature Strip', grass: 'Couch',  area: 20.8 },
  strip2: { name: 'Left Strip',   grass: 'Couch',  area: 16.15 }
};

var CAUTION_ICONS = {
  'iron-overload': 'Fe',
  'kelpxtra-solo': 'SOLO',
  'fungicide-rotation': 'ROT',
  'staining': 'STAIN',
  'water-in': 'H2O',
  'no-backpack-sprayer': 'NO BP',
  'low-stock': 'LOW',
  'pre-emergent-weed-free-first': 'WF1st',
  'tank-mix-dilute-first': 'DIL'
};

async function init() {
  showScreen('loading');
  var urlParams = new URLSearchParams(window.location.search);
  var code = urlParams.get('code');
  if (code) {
    await handleOAuthCallback(code);
    window.history.replaceState({}, '', window.location.pathname);
  }
  var savedToken = sessionStorage.getItem('gh_token');
  if (savedToken) state.token = savedToken;

  try {
    var resp = await fetch(CONFIG.programUrl + '?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    state.program = await resp.json();
  } catch(e) {
    document.getElementById('error-msg-text').textContent = 'Could not load program.json from GitHub: ' + e.message;
    showScreen('error');
    return;
  }

  var now = new Date();
  state.currentMonth = now.getMonth() + 1;
  await loadCompletions();
  renderMonthNav();
  renderMonth(state.currentMonth);
  updateAuthUI();
  showScreen('app');
}

function startLogin() {
  var loginUrl = CONFIG.workerUrl + '/login?redirect=' + encodeURIComponent(window.location.href);
  window.location.href = loginUrl;
}

async function handleOAuthCallback(code) {
  try {
    var resp = await fetch(CONFIG.workerUrl + '/callback?code=' + code);
    var data = await resp.json();
    if (data.access_token) {
      state.token = data.access_token;
      sessionStorage.setItem('gh_token', data.access_token);
    }
  } catch(e) { console.warn('OAuth callback failed:', e); }
}

function loadWithoutAuth() {
  state.readOnly = true;
  renderMonthNav();
  renderMonth(state.currentMonth);
  updateAuthUI();
  showScreen('app');
}

function updateAuthUI() {
  var dot = document.getElementById('auth-dot');
  var statusText = document.getElementById('auth-status-text');
  var loginBtn = document.getElementById('login-btn');
  if (state.token) {
    dot.classList.add('connected');
    statusText.textContent = 'GitHub connected';
    loginBtn.classList.add('hidden');
  } else {
    dot.classList.remove('connected');
    statusText.textContent = state.readOnly ? 'Read-only mode' : 'Not connected';
    loginBtn.classList.remove('hidden');
  }
}

async function loadCompletions() {
  try {
    var url = 'https://api.github.com/repos/' + CONFIG.owner + '/' + CONFIG.repo + '/contents/' + CONFIG.completionsPath;
    var headers = { 'Accept': 'application/vnd.github.v3+json' };
    if (state.token) headers['Authorization'] = 'token ' + state.token;
    var resp = await fetch(url, { headers: headers });
    if (resp.status === 404) { state.completions = {}; state.completionsSha = null; return; }
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    state.completionsSha = data.sha;
    var decoded = atob(data.content.replace(/\n/g, ''));
    state.completions = JSON.parse(decoded);
  } catch(e) { console.warn('Could not load completions:', e); state.completions = {}; }
}

async function saveCompletions() {
  if (!state.token) { showToast('Connect GitHub to save completions', 'error'); return false; }
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(state.completions, null, 2))));
  var url = 'https://api.github.com/repos/' + CONFIG.owner + '/' + CONFIG.repo + '/contents/' + CONFIG.completionsPath;
  var body = { message: 'Update task completions', content: content, branch: CONFIG.branch };
  if (state.completionsSha) body.sha = state.completionsSha;
  try {
    var resp = await fetch(url, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + state.token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!resp.ok) { var err = await resp.json(); throw new Error(err.message || 'Save failed'); }
    var data = await resp.json();
    state.completionsSha = data.content.sha;
    return true;
  } catch(e) { console.error('Save completions failed:', e); showToast('Save failed: ' + e.message, 'error'); return false; }
}

async function toggleTask(taskId, checkEl, cardEl) {
  var isCompleted = !!state.completions[taskId];
  if (isCompleted) {
    delete state.completions[taskId];
    checkEl.classList.remove('checked');
    cardEl.classList.remove('completed');
  } else {
    state.completions[taskId] = { completedAt: new Date().toLocaleDateString('en-AU'), completedTime: new Date().toISOString() };
    checkEl.classList.add('checked');
    cardEl.classList.add('completed');
  }
  updateProgress(state.currentMonth);
  var infoEl = cardEl.querySelector('.completion-info');
  if (infoEl) infoEl.textContent = state.completions[taskId] ? 'Completed ' + state.completions[taskId].completedAt : '';
  if (state.token) {
    checkEl.classList.add('saving');
    var ok = await saveCompletions();
    checkEl.classList.remove('saving');
    if (ok) showToast(isCompleted ? 'Marked incomplete' : 'Task completed', 'success');
  } else {
    showToast('Not saved \u2014 connect GitHub to persist', 'error');
  }
}

function renderMonthNav() {
  var nav = document.getElementById('month-nav');
  nav.innerHTML = '';
  var now = new Date();
  var thisMonth = now.getMonth() + 1;
  state.program.months.forEach(function(m) {
    var btn = document.createElement('button');
    btn.className = 'month-btn';
    if (m.monthNum === state.currentMonth) btn.classList.add('active');
    if (m.monthNum === thisMonth) btn.classList.add('current-month');
    btn.textContent = m.month.slice(0,3).toUpperCase();
    btn.addEventListener('click', function() {
      document.querySelectorAll('.month-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      state.currentMonth = m.monthNum;
      renderMonth(m.monthNum);
    });
    nav.appendChild(btn);
  });
}

function renderMonth(monthNum) {
  var monthData = null;
  for (var i = 0; i < state.program.months.length; i++) {
    if (state.program.months[i].monthNum === monthNum) { monthData = state.program.months[i]; break; }
  }
  if (!monthData) return;
  var main = document.getElementById('main-content');
  main.innerHTML = '';
  var headerRow = document.createElement('div');
  headerRow.className = 'month-header-row';
  headerRow.innerHTML = '<div class="month-title">' + monthData.month + ' <span class="season-badge ' + monthData.season + '">' + monthData.season + '</span></div>';
  main.appendChild(headerRow);
  monthData.weeks.forEach(function(week) {
    var weekBlock = document.createElement('div');
    weekBlock.className = 'week-block';
    var weekLabel = week.label.replace(/^Week \d+ \u2014 /, '').replace(/^Week \d+ - /, '');
    weekBlock.innerHTML = '<div class="week-heading"><span class="week-num">W' + week.week + '</span><span class="week-label-text">' + weekLabel + '</span></div>';
    if (!week.tasks || week.tasks.length === 0) {
      weekBlock.innerHTML += '<div style="padding:16px;text-align:center;color:var(--ink-light);font-size:13px;font-style:italic;">No tasks scheduled.</div>';
    } else {
      week.tasks.forEach(function(task) { weekBlock.appendChild(renderTaskCard(task)); });
    }
    main.appendChild(weekBlock);
  });
  updateProgress(monthNum);
}

function fmt(val) {
  var r = Math.round(val * 10) / 10;
  return r % 1 === 0 ? r.toString() : r.toFixed(1);
}

function renderTaskCard(task) {
  var isCompleted = !!state.completions[task.id];
  var card = document.createElement('div');
  card.className = 'task-card' + (isCompleted ? ' completed' : '') + (task.conditional ? ' conditional' : '');

  var checkEl = document.createElement('div');
  checkEl.className = 'task-check' + (isCompleted ? ' checked' : '');
  checkEl.addEventListener('click', function(e) { e.stopPropagation(); toggleTask(task.id, checkEl, card); });

  var typeLabel = task.taskType === 'soilwetter' ? 'soil wetter' : task.taskType;
  var condHtml = task.conditional ? '<span class="conditional-flag">if required</span>' : '';
  var waterHint = task.waterIn ? ' \u00B7 H2O water in' : (task.foliarOrIrrigate === 'Foliar' ? ' \u00B7 foliar \u2014 allow to dry' : '');

  var taskBody = document.createElement('div');
  taskBody.className = 'task-body';
  taskBody.innerHTML =
    '<div class="task-top"><span class="task-label">' + escHtml(task.label) + '</span>' +
    '<span class="type-tag ' + task.taskType + '">' + typeLabel + '</span>' + condHtml + '</div>' +
    '<div class="task-method">' + escHtml(task.applicationMethod) + waterHint + '</div>' +
    '<button class="expand-btn">&#x25B8; Rates &amp; details</button>';

  var header = document.createElement('div');
  header.className = 'task-header';
  header.appendChild(checkEl);
  header.appendChild(taskBody);
  card.appendChild(header);

  taskBody.querySelector('.expand-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    var detail = card.querySelector('.task-detail');
    var open = detail.classList.toggle('open');
    this.innerHTML = (open ? '&#x25BE;' : '&#x25B8;') + ' Rates &amp; details';
  });

  if (task.conditional && task.condition) {
    var banner = document.createElement('div');
    banner.className = 'condition-banner';
    banner.textContent = '\u26A0 ' + task.condition;
    card.appendChild(banner);
  }

  var detail = document.createElement('div');
  detail.className = 'task-detail';

  if (task.products && task.products.length > 0) {
    var pt = document.createElement('div');
    pt.className = 'products-title';
    pt.textContent = 'Product quantities by zone';
    detail.appendChild(pt);
    task.products.forEach(function(prod) {
      var pr = document.createElement('div');
      pr.style.cssText = 'padding:9px 0;border-top:1px solid var(--border);';
      pr.innerHTML = '<div class="product-name">' + escHtml(prod.name) + ' \u2014 ' + prod.ratePer100sqm + prod.rateUnit + '/100m\u00B2</div>';
      if (prod.note) pr.innerHTML += '<div class="product-note">' + escHtml(prod.note) + '</div>';
      var zw = document.createElement('div');
      zw.className = 'product-zones';
      var zones = task.zones || Object.keys(prod.quantities || {});

      var frontQty = null, strip1Qty = null, strip2Qty = null;

      zones.forEach(function(zid) {
        if (!prod.quantities || prod.quantities[zid] === undefined) return;
        var info = ZONE_LABELS[zid];
        if (!info) return;
        var qty = prod.quantities[zid];
        if (zid === 'front')  frontQty  = qty;
        if (zid === 'strip1') strip1Qty = qty;
        if (zid === 'strip2') strip2Qty = qty;
        var chip = document.createElement('div');
        chip.className = 'zone-qty';
        chip.innerHTML = '<div class="zone-qty-label">' + info.name + '</div>' +
          '<div class="zone-qty-grass">' + info.grass + ' \u00B7 ' + info.area + 'm\u00B2</div>' +
          '<div class="zone-qty-amount">' + qty + prod.rateUnit + '</div>';
        zw.appendChild(chip);
      });

      var presentFront = [frontQty, strip1Qty, strip2Qty].filter(function(v) { return v !== null; });
      if (presentFront.length >= 2) {
        var combinedTotal = (frontQty || 0) + (strip1Qty || 0) + (strip2Qty || 0);
        var combinedArea = 0;
        if (frontQty  !== null) combinedArea += 35.0;
        if (strip1Qty !== null) combinedArea += 20.8;
        if (strip2Qty !== null) combinedArea += 16.15;

        var divider = document.createElement('div');
        divider.className = 'zone-qty-divider';
        zw.appendChild(divider);

        var combined = document.createElement('div');
        combined.className = 'zone-qty combined';
        combined.innerHTML =
          '<div class="zone-qty-label">Front + Strips</div>' +
          '<div class="zone-qty-grass">Combined \u00B7 ' + fmt(combinedArea) + 'm\u00B2</div>' +
          '<div class="zone-qty-amount">' + fmt(combinedTotal) + prod.rateUnit + '</div>';
        zw.appendChild(combined);
      }

      pr.appendChild(zw);
      detail.appendChild(pr);
    });
  }

  if (task.notes) {
    var ns = document.createElement('div');
    ns.className = 'notes-section';
    ns.innerHTML = '<div class="task-notes-text">' + escHtml(task.notes) + '</div>';
    if (task.cautions && task.cautions.length > 0) {
      var cw = document.createElement('div');
      cw.className = 'cautions-wrap';
      task.cautions.forEach(function(cKey) {
        var desc = (state.program.cautions && state.program.cautions[cKey]) || cKey;
        var icon = CAUTION_ICONS[cKey] || '!';
        var label = cKey.replace(/-/g, ' ');
        var chip = document.createElement('div');
        chip.className = 'caution-chip';
        chip.dataset.caution = cKey;
        chip.innerHTML = '<span>' + icon + '</span> ' + label + '<span class="caution-tooltip">' + escHtml(desc) + '</span>';
        cw.appendChild(chip);
      });
      ns.appendChild(cw);
    }
    detail.appendChild(ns);
  }

  var ci = document.createElement('div');
  ci.className = 'completion-info';
  if (state.completions[task.id]) ci.textContent = 'Completed ' + state.completions[task.id].completedAt;
  detail.appendChild(ci);
  card.appendChild(detail);
  return card;
}

function updateProgress(monthNum) {
  var monthData = null;
  for (var i = 0; i < state.program.months.length; i++) {
    if (state.program.months[i].monthNum === monthNum) { monthData = state.program.months[i]; break; }
  }
  if (!monthData) return;
  var total = 0, done = 0;
  monthData.weeks.forEach(function(w) {
    (w.tasks || []).forEach(function(t) { total++; if (state.completions[t.id]) done++; });
  });
  var pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-count').textContent = done + ' / ' + total + ' tasks';
}

function showScreen(name) {
  document.getElementById('loading-screen').style.display = name === 'loading' ? 'flex' : 'none';
  document.getElementById('error-screen').style.display = name === 'error' ? 'flex' : 'none';
  document.getElementById('auth-gate').style.display = name === 'auth-gate' ? 'flex' : 'none';
  document.getElementById('app').style.display = name === 'app' ? 'block' : 'none';
}

var toastTimer;
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.className = ''; }, 3000);
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
